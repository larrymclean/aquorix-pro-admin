<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AQUORIX Widget Embed Demo</title>
    <link rel="stylesheet" href="/widget-embed.css" />
  </head>
  <body style="background:#5f7c95; margin:0; padding:40px; font-family:system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;">
    <h2>AQUORIX Scheduler Widget Demo</h2>
    <div id="aqx-widget" style="border: 1px solid #ccc; padding: 12px; border-radius: 10px;"></div>

    <script src="/aquorix-scheduler-widget.iife.js?v=20260306-acceptance"></script>

<script>
  (function () {
    var host = document.getElementById("aqx-widget");
    if (!host) {
      console.error("Host #aqx-widget missing");
      return;
    }

    if (!window.AquorixSchedulerWidget) {
      host.innerHTML = '<div style="padding:12px;color:#b00020;border:1px solid #b00020;border-radius:8px;">ERROR: Bundle did not load. window.AquorixSchedulerWidget is undefined.</div>';
      return;
    }

    if (typeof window.AquorixSchedulerWidget.mount !== "function") {
      host.innerHTML = '<div style="padding:12px;color:#b00020;border:1px solid #b00020;border-radius:8px;">ERROR: mount() is missing on window.AquorixSchedulerWidget. Check build.lib.name + export wiring.</div>';
      return;
    }

    try {
      window.AquorixSchedulerWidget.mount("#aqx-widget", { operatorSlug: "demo-operator", destinationTimeZone: "Asia/Amman" });
      console.log("OK: widget mounted");
    } catch (err) {
      host.innerHTML = '<div style="padding:12px;color:#b00020;border:1px solid #b00020;border-radius:8px;">ERROR: mount() threw: ' + String(err && err.message ? err.message : err) + "</div>";
      console.error(err);
    }
  })();
</script>
  </body>
</html>
